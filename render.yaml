services:
  # ──────────────────────────────────────────────
  # 1. Signaling Server (Node.js / Socket.IO)
  # ──────────────────────────────────────────────
  - type: web
    name: visiontalk-signaling
    runtime: node
    rootDir: signaling
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: "3001"

  # ──────────────────────────────────────────────
  # 2. Flask ASL Inference Server (Python)
  # ──────────────────────────────────────────────
  - type: web
    name: visiontalk-server
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
    envVars:
      - key: MODEL_PATH
        value: /model1.p

  # ──────────────────────────────────────────────
  # 3. React Frontend (Static Site)
  # ──────────────────────────────────────────────
  - type: web
    name: visiontalk
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_APP_SIGNALING_URL
        value: https://visiontalk-signaling.onrender.com
      - key: VITE_APP_BACKEND_URL
        value: https://visiontalk-server.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

